services:
  web:
    image: asia-southeast3-docker.pkg.dev/fisheries-idp-4091/my-repo/my-docker-app:latest
    container_name: nextjs-app
    ports:
      - "3000:3000"          
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db                   

  db:
    image: postgres:15-alpine
    container_name: nextjs-postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"          
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: